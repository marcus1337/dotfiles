# Easier prefix than Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Faster and snappier
set -sg escape-time 0
set -g repeat-time 300

# Start counting at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows after closing one
set -g renumber-windows on

# Big scrollback
set -g history-limit 100000

# Use vi keys in copy mode
setw -g mode-keys vi

# Keep status bar at bottom
set -g status-position bottom

# Let terminal titles update nicely
set -g set-titles on

# Mouse support (resize panes, select panes, scroll)
set -g mouse on


